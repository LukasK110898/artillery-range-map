<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">ARM Logo</title>
  <desc id="desc">Black ARM lettering with a thin white outline on a bright Ukrainian flag background.</desc>
  <rect width="128" height="128" rx="24" fill="#ffffff"/>
  <clipPath id="round">
    <rect x="3" y="3" width="122" height="122" rx="22"/>
  </clipPath>
  <g clip-path="url(#round)">
    <rect x="3" y="3" width="122" height="61" fill="#69cfff"/>
    <rect x="3" y="64" width="122" height="61" fill="#ffec7a"/>
  </g>
  <rect x="3" y="3" width="122" height="122" rx="22" fill="none" stroke="#ffffff" stroke-width="3"/>
  <text x="64" y="76" text-anchor="middle"
    font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="38" font-weight="900"
    letter-spacing="5" fill="#050505" stroke="#ffffff" stroke-width="1.4" paint-order="stroke fill">ARM</text>
</svg>
