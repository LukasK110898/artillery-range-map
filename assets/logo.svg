<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">ARM Logo</title>
  <desc id="desc">White ARM lettering on a dark mark with the Ukrainian flag in the background.</desc>
  <defs>
    <linearGradient id="shade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050914" stop-opacity=".62"/>
      <stop offset=".52" stop-color="#0a0f1f" stop-opacity=".82"/>
      <stop offset="1" stop-color="#020510" stop-opacity=".7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000814" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="128" height="64" rx="24" fill="#0057b7"/>
  <rect y="64" width="128" height="64" rx="24" fill="#ffd700"/>
  <rect width="128" height="128" rx="24" fill="url(#shade)"/>
  <rect x="7" y="7" width="114" height="114" rx="20" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="2"/>
  <text x="64" y="76" text-anchor="middle" filter="url(#shadow)"
    font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="38" font-weight="900"
    letter-spacing="5" fill="#ffffff">ARM</text>
</svg>
